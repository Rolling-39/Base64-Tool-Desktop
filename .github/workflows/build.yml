name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win-x64
            ext: .exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            ext: ''
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
            ext: ''

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: npm ci
        run: npm ci

      - name: Build (Tauri)
        env:
          CARGO_BUILD_TARGET: ${{ matrix.target }}
        run: npm run build
        shell: bash

      - name: Collect binary
        shell: bash
        run: |
          target_dir="src-tauri/target/${{ matrix.target }}/release"
          mkdir -p dist-artifacts
          bin="$target_dir/base64-tool${{ matrix.ext }}"
          if [ -f "$bin" ]; then
            cp "$bin" "dist-artifacts/base64-tool-${{ matrix.platform }}${{ matrix.ext }}"
            echo "OK: dist-artifacts/base64-tool-${{ matrix.platform }}${{ matrix.ext }}"
          else
            echo "FAIL: binary not at $bin"
            find src-tauri/target -maxdepth 4 -type f -name "base64-tool*" 2>/dev/null
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: dist-artifacts/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: List files
        run: find dist-artifacts -type f -ls

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-artifacts/base64-tool-*
          generate_release_notes: true
